<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="utf-8">
    <title>Liste des PCs</title>
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}" />
</head>
<body>
    <div th:replace="template"></div>
    
    <div class="container mt-5">
        <div class="card">
            <div class="card-header">Liste des PCs</div>
            <div class="card-body">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nom PC</th>
                            <th>Prix</th>
                            <th>Date</th>
                            <th>Style</th>
                            <th sec:authorize="hasAuthority('ADMIN')">Editer</th>
                            <th sec:authorize="hasAuthority('ADMIN')">Supprimer</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : ${pcs.content}">
                            <td th:text="${p.idPc}"></td>
                            <td th:text="${p.nomPc}"></td>
                            <td th:text="${p.prixPc}"></td>
                            <td th:text="${p.dateCreation}"></td>
                            <td th:text="${p.style != null ? p.style.nomStyle : 'Pas de Style'}"></td>
                            <td sec:authorize="hasAuthority('ADMIN')">
                                <a class="btn btn-success" th:href="@{modifierPc(id=${p.idPc})}">Editer</a>
                            </td>
                            <td sec:authorize="hasAuthority('ADMIN')">
                                <a class="btn btn-danger" onclick="return confirm('Etes-vous sûr ?')"
                                   th:href="@{supprimerPc(id=${p.idPc}, page=${currentPage}, size=${size})}">Supprimer</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                <ul class="nav nav-pills">
                    <li th:each="page,status:${pages}">
                        <a th:class="${status.index==currentPage?'btn btn-primary':'btn'}"
                           th:href="@{listePcs(page=${status.index}, size=${size})}"
                           th:text="${status.index}"></a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</body>
</html>
