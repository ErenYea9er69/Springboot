<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f6f9; /* Fond gris clair */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 450px; /* Largeur de la carte */
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="card shadow-sm">
            <div class="card-header bg-light">Connexion</div>
            <div class="card-body bg-light">
                
                <div th:if="${param.error}" class="alert alert-danger text-center">
                    Utilisateur ou mot de passe incorrect.
                </div>
                <div th:if="${param.logout}" class="alert alert-success text-center">
                    Vous avez été déconnecté.
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="form-group mb-3">
                        <label class="control-label mb-1">Utilisateur :</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    
                    <div class="form-group mb-3">
                        <label class="control-label mb-1">Mot de passe :</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Connexion</button>
                </form>
                
            </div>
        </div>
    </div>

</body>
</html>
