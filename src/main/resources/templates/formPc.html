<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="utf-8">
    <title>Formulaire PC</title>
    <link rel="stylesheet" type="text/css" th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}" />
</head>
<body>
    <div th:replace="~{template :: navbar}"></div>
    
    <div class="container mt-5">
        <div class="card">
            <div class="card-header">Formulaire de PC</div>
            <div class="card-body">
                <form th:action="@{/savePc}" method="post" th:object="${pc}">
                    
                    <div class="form-group" th:if="${pc.idPc != null}">
                        <label class="control-label">ID PC :</label>
                        <input type="text" th:field="*{idPc}" class="form-control" readonly />
                    </div>
                    
                    <div class="form-group">
                        <label class="control-label">Nom PC :</label>
                        <input type="text" th:field="*{nomPc}" class="form-control" />
                        <span th:errors="*{nomPc}" class="text-danger"></span>
                    </div>
                    
                    <div class="form-group">
                        <label class="control-label">Prix :</label>
                        <input type="text" th:field="*{prixPc}" class="form-control" />
                        <span th:errors="*{prixPc}" class="text-danger"></span>
                    </div>
                    
                    <div class="form-group">
                        <label class="control-label">Date de Création :</label>
                        <input type="date" th:field="*{dateCreation}" class="form-control" />
                        <span th:errors="*{dateCreation}" class="text-danger"></span>
                    </div>
                    
                    <div class="form-group">
                        <label class="control-label">Style :</label>
                        <select th:field="*{style}" class="form-control">
                            <option th:each="s : ${styles}" 
                                    th:value="${s.idStyle}" 
                                    th:text="${s.nomStyle}">
                            </option>
                        </select>
                        <span th:errors="*{style}" class="text-danger"></span>
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
