<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/Layout">
<head>
    <meta charset="utf-8">
    <title>Formulaire Pc</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
</head>
<body>
    <div th:replace="template"></div>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header" th:if="${mode=='new'}"> Ajout des PCs </div>
            <div class="card-header" th:if="${mode=='edit'}"> Modification des PCs </div>
            <div class="card-body">
                <form th:action="@{savePc}" method="post">
                    
                    <input type="hidden" name="page" class="form-control" th:value="${page}" />
                    <input type="hidden" name="size" class="form-control" th:value="${size}" />
                    
                    <div class="form-group" th:if="${mode=='edit'}">
                        <label class="control-label" hidden>ID Pc : </label>
                        <input type="hidden" name="idPc" class="form-control" th:value="${pc.idPc}" />
                    </div>
                    
                    <div class="form-group">
                        <label class="control-label">Nom Pc : </label>
                        <input type="text" name="nomPc" class="form-control" th:value="${pc.nomPc}" required />
                        <span th:errors="${pc.nomPc}" class="text-danger"> </span>
                    </div>
                    
                    <div class="form-group">
                        <label class="control-label">Prix Pc: </label>
                        <input type="number" step="0.01" name="prixPc" class="form-control" th:value="${pc.prixPc}" required />
                        <span th:errors="${pc.prixPc}" class="text-danger"> </span>
                    </div>
                    
                    <div class="form-group">
                        <label class="control-label">Date création: </label>
                        <input type="date" name="dateCreation" class="form-control" 
                               th:value="${pc.dateCreation}" 
                               th:min="${#dates.format(#dates.createNow(), 'yyyy-MM-dd')}" 
                               required />
                        <span th:errors="${pc.dateCreation}" class="text-danger"> </span>
                    </div>

                    <div class="form-group">
                        <label class="control-label">Style: </label>
                        
                        <select name="style" class="form-control" 
                                th:if="${pc.style != null}">
                            <option th:each="s:${styles}" 
                                    th:value="${s.idStyle}" 
                                    th:text="${s.nomStyle}" 
                                    th:selected="${s.idStyle==pc.style.idStyle}">
                            </option>
                        </select>
                        
                        <select name="style" class="form-control" 
                                th:if="${pc.style == null}">
                            <option th:each="s:${styles}" 
                                    th:value="${s.idStyle}" 
                                    th:text="${s.nomStyle}">
                            </option>
                        </select>
                    </div>

                    <div>
                        <button type="submit" class="btn btn-primary">Valider</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
